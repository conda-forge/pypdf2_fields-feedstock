{% set name = "PyPDF2_Fields" %}
{% set version = "1.0.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/PyPDF2_Fields-{{ version }}.tar.gz
  sha256: 22f03264d022d8e8e89881ed745047797ae8bf697e69705ffc39f072691710e1

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - pypdf2 ==1.26.0
    - python >={{ python_min }}

test:
  imports:
    - PyPDF2_Fields
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/GRV96/PyPDF2_Fields
  summary: >-
    Library PyPDF2_Fields is a complement to PyPDF2.
    It helps reading and setting a PDF file's fields,
    knowing their type and controlling their editability.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - GRV96
